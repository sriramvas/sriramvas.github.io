---
layout: default
title: Sriram Vasudevan
---
 
<ul class="posts">
  {% for post in site.posts %}
  <li>
    <span class="date">{{ post.date | date: "%Y-%m-%d" }}</span>
    <span>
      <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      {% for tag in post.tags %}
        <span class="tag">{{ tag }}</span>
      {% endfor %}
    </span>
  </li>
  {% endfor %}
</ul>
